<!DOCTYPE html>
<html>
<head>
  <title>Pixel MMO</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    #login {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

<div id="login">
  <input id="nameInput" placeholder="Enter name"/>
  <button onclick="login()">Play</button>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let players = {};
let myId = null;

function login() {
  const name = document.getElementById("nameInput").value;
  socket.emit("login", name);
  document.getElementById("login").style.display = "none";
}

socket.on("currentPlayers", (serverPlayers) => {
  players = serverPlayers;
  myId = socket.id;
});

socket.on("newPlayer", (player) => {
  players[player.id] = player;
});

socket.on("playerMoved", (player) => {
  players[player.id] = player;
});

socket.on("playerDisconnected", (id) => {
  delete players[id];
});

document.addEventListener("keydown", (e) => {
  if (!players[myId]) return;

  if (e.key === "w") players[myId].y -= 5;
  if (e.key === "s") players[myId].y += 5;
  if (e.key === "a") players[myId].x -= 5;
  if (e.key === "d") players[myId].x += 5;

  socket.emit("move", players[myId]);
});

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let id in players) {
    const p = players[id];

    ctx.fillStyle = getColor(p.charId);
    ctx.fillRect(p.x, p.y, 20, 20);
  }

  requestAnimationFrame(draw);
}

function getColor(id) {
  const colors = [
    "red","blue","green","yellow","purple",
    "cyan","orange","pink","white","lime",
    "magenta","brown","gray","gold","teal"
  ];
  return colors[id];
}

draw();

</script>
</body>
</html>
