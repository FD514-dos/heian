<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Heian MMO</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
}

#loginScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  z-index: 10;
}

#welcomeScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: black;
  z-index: 9;
  font-size: 28px;
}

canvas {
  display: none;
  background: #111;
}
</style>
</head>
<body>

<div id="loginScreen">
  <div>
    <h2>thỉnh quân báo danh tính</h2>
    <input id="nameInput" type="text"/>
    <button onclick="login()">Enter</button>
  </div>
</div>

<div id="welcomeScreen">
  mừng khách nhân tới Heian
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
  canvas.style.touchAction = "none";
// ===== MOBILE CONTROL =====

let touchMove = null;

canvas.addEventListener("touchstart", (e) => {
  const touch = e.touches[0];

  const x = touch.clientX;
  const y = touch.clientY;

  let direction;

  if (Math.abs(x - window.innerWidth/2) > Math.abs(y - window.innerHeight/2)) {
    if (x < window.innerWidth/2) direction = "ArrowLeft";
    else direction = "ArrowRight";
  } else {
    if (y < window.innerHeight/2) direction = "ArrowUp";
    else direction = "ArrowDown";
  }

  touchMove = setInterval(() => {
    socket.emit("move", direction);
  }, 50); // tốc độ di chuyển
});

canvas.addEventListener("touchend", () => {
  clearInterval(touchMove);
});
canvas.setAttribute("tabindex", "0");
canvas.focus();

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let players = {};
let myId = null;
  // ===== WALK ANIMATION =====
let walkFrame = false;

// ===== LOAD IMAGES =====
const imgFront = new Image();
imgFront.src = "../assets/fyodor_front.png";

const imgBack = new Image();
imgBack.src = "../assets/fyodor_back.png";

const imgBack1 = new Image();
imgBack1.src = "../assets/fyodor_back_walk_1.png";

const imgBack2 = new Image();
imgBack2.src = "../assets/fyodor_back_walk_2.png";
  let walkFrame = 0;
const mapWidth = 4000;
const mapHeight = 4000;

function login() {
  const name = document.getElementById("nameInput").value.trim();
  socket.emit("login", name);
}

socket.on("loginSuccess", (id) => {
  myId = id;

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("welcomeScreen").style.display = "flex";

  setTimeout(() => {
    document.getElementById("welcomeScreen").style.display = "none";
    canvas.style.display = "block";
  }, 2000);
});

socket.on("loginFailed", () => {
  alert("Tên không tồn tại trong danh sách.");
});

socket.on("updatePlayers", (serverPlayers) => {
  players = serverPlayers;
});

canvas.addEventListener("keydown", (e) => {
  socket.emit("move", e.key);
});
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!players[myId]) {
    requestAnimationFrame(draw);
    return;
  }

  const me = players[myId];

  // ===== CAMERA =====
  const camX = me.x - canvas.width / 2;
  const camY = me.y - canvas.height / 2;

  ctx.save();
  ctx.translate(-camX, -camY);

  // ===== MAP =====
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, mapWidth, mapHeight);
// ===== GRASS =====
const grass = [];

for (let i = 0; i < 300; i++) {
  grass.push({
    x: Math.random() * mapWidth,
    y: Math.random() * mapHeight
  });
}
  // ===== GRASS =====
  ctx.fillStyle = "#7ed957";

  for (let g of grass) {
    ctx.fillRect(g.x, g.y, 3, 3);
  }

  // ===== PLAYERS =====
  for (let id in players) {

    const p = players[id];
    let img = imgFront;

    // animation đơn giản
if (p.y < me.y) {
      img = walkFrame ? imgBack1 : imgBack2;
    }

    ctx.drawImage(img, p.x, p.y, 48, 48);

    ctx.fillStyle = "black";
    ctx.font = "14px Arial";
    ctx.textAlign = "center";
    ctx.fillText(p.name, p.x + 24, p.y - 8);
  }

  ctx.restore();

  requestAnimationFrame(draw);
}

draw();
setInterval(()=>{
  walkFrame = (walkFrame + 1) % 2;
},200);
</script>
</body>
</html>
