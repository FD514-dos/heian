<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Heian MMO</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
}

#loginScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  z-index: 10;
}

#welcomeScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: black;
  z-index: 9;
  font-size: 28px;
}

canvas {
  display: none;
  background: #111;
}
</style>
</head>
<body>

<div id="loginScreen">
  <div>
    <h2>thỉnh quân báo danh tính</h2>
    <input id="nameInput" type="text"/>
    <button onclick="login()">Enter</button>
  </div>
</div>

<div id="welcomeScreen">
  mừng khách nhân tới Heian
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let players = {};
let myId = null;
// ===== LOAD IMAGES =====
const imgFront = new Image();
imgFront.src = "../assets/fyodor_front.jpg";

const imgBack = new Image();
imgBack.src = "../assets/fyodor_back.jpg";

const imgBack1 = new Image();
imgBack1.src = "../assets/fyodor_back_walk_1.jpg";

const imgBack2 = new Image();
imgBack2.src = "../assets/fyodor_back_walk_2.jpg";
const mapWidth = 4000;
const mapHeight = 4000;

function login() {
  const name = document.getElementById("nameInput").value.trim();
  socket.emit("login", name);
}

socket.on("loginSuccess", (id) => {
  myId = id;

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("welcomeScreen").style.display = "flex";

  setTimeout(() => {
    document.getElementById("welcomeScreen").style.display = "none";
    canvas.style.display = "block";
  }, 2000);
});

socket.on("loginFailed", () => {
  alert("Tên không tồn tại trong danh sách.");
});

socket.on("updatePlayers", (serverPlayers) => {
  players = serverPlayers;
});

document.addEventListener("keydown", (e) => {
  socket.emit("move", e.key);
});

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!players[myId]) {
    requestAnimationFrame(draw);
    return;
  }

  const me = players[myId];

  // ===== CAMERA =====
  const camX = me.x - canvas.width / 2;
  const camY = me.y - canvas.height / 2;

  ctx.save();
  ctx.translate(-camX, -camY);

  // ===== MAP (đen trắng) =====
  ctx.fillStyle = "#222";
  ctx.fillRect(0, 0, mapWidth, mapHeight);

  // ===== PLAYERS =====
  for (let id in players) {
    const p = players[id];

   ctx.drawImage(imgFront, p.x, p.y, 40, 40);

    ctx.fillStyle = "white";
    ctx.font = "14px Arial";
    ctx.textAlign = "center";
    ctx.fillText(p.name, p.x + 20, p.y - 8);
  }

  ctx.restore();

  requestAnimationFrame(draw);
}

draw();

</script>
</body>
</html>
